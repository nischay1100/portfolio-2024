<script>
// ========== Typewriter Effect ==========
const typedText = document.querySelector(".typewriter");
const phrases = [
  "IT Student",
  "Frontend Learner",
  "Creative Coder 💻",
  "Future Developer 🚀",
  "indian"
];
let phraseIndex = 0;
let letterIndex = 0;
let currentPhrase = "";
let isDeleting = false;

function type() {
  currentPhrase = phrases[phraseIndex];
  let displayText = currentPhrase.substring(0, letterIndex);
  typedText.textContent = displayText;

  if (!isDeleting && letterIndex < currentPhrase.length) {
    letterIndex++;
    setTimeout(type, 100);
  } else if (isDeleting && letterIndex > 0) {
    letterIndex--;
    setTimeout(type, 50);
  } else {
    isDeleting = !isDeleting;
    if (!isDeleting) phraseIndex = (phraseIndex + 1) % phrases.length;
    setTimeout(type, 1000);
  }
}

// ========== Menu Toggle ==========
const menuToggle = document.getElementById('menu-toggle');
const navLinks = document.getElementById('nav-links');

menuToggle.addEventListener('click', () => {
  navLinks.classList.toggle('active');
  document.body.classList.toggle('no-scroll');
});

// Fade In on Load 
document.addEventListener("DOMContentLoaded", () => {
  document.body.style.opacity = 1;
  type(); // Start typewriter
  document.querySelectorAll(".fade-up").forEach(el => {
    setTimeout(() => {
      el.classList.add("visible");
    }, 200);
  });
});

//Fade Out on Navigation 
document.querySelectorAll("a[href]").forEach(link => {
  const href = link.getAttribute("href");
  if (href.startsWith("#") || link.target === "_blank") return;

  link.addEventListener("click", function (e) {
    e.preventDefault();
    document.body.style.opacity = 0;
    setTimeout(() => {
      window.location.href = href;
    }, 300);
  });
});

// Reveal on Scroll 
function revealOnScroll() {
  const elements = document.querySelectorAll(".fade-up");
  const windowHeight = window.innerHeight;

  elements.forEach(el => {
    const elementTop = el.getBoundingClientRect().top;
    if (elementTop < windowHeight - 50) {
      el.classList.add("visible");
    }
  });
}
window.addEventListener("scroll", revealOnScroll);
window.addEventListener("load", revealOnScroll);


const toggleBtn = document.getElementById("themeToggle");

window.addEventListener("load", () => {
  const savedTheme = localStorage.getItem("theme");
  if (savedTheme === "light") {
    document.body.classList.add("light-theme");
    toggleBtn.textContent = "☀️"; 
  } else {
    toggleBtn.textContent = "🌙"; 
  }
});


toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("light-theme");
  if (document.body.classList.contains("light-theme")) {
    localStorage.setItem("theme", "light");
    toggleBtn.textContent = "☀️";  
  } else {
    localStorage.setItem("theme", "dark");
    toggleBtn.textContent = "🌙";  
  }
});
</script>
