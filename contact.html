<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Nischay Pandey</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- Navbar -->
 
 <header class="navbar">
  <div class="logo">Nischay<span>.Dev</span></div>
  <div class="menu-toggle" id="menu-toggle">&#9776;</div> 
  <nav class="nav-links" id="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="projects.html">Projects</a>
    <a href="services.html">Services</a>
    <a href="resume.html">Resume</a>
    <a href="contact.html" class="active">Contact</a>
  </nav>
<button id="themeToggle" aria-label="Toggle Theme" class="theme-toggle-btn">🌙</button>
</header>

  <!-- Contact Section -->
  <section class="contact-section reveal">
    <h2 class="section-title">Get in <span>Touch</span></h2>
    <div class="contact-container">
     <form class="contact-form" action="https://formspree.io/f/manqbqvn" method="POST" id="contactForm">
  <input type="text" name="name" placeholder="Your Name" required />
  <input type="email" name="email" placeholder="Your Email" required />
  <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
  <button type="submit">Send Message</button>
  <p id="formMessage" style="display:none; color: green; margin-top: 10px;">Your response has been submitted!</p>
</form>
      <div class="contact-info">
        <h3>Contact Info</h3>
        <p><i class="fas fa-envelope"></i> nischaypandey@934.com</p>
        <p><i class="fas fa-phone"></i> +91 9876543210</p>
        <p><i class="fas fa-map-marker-alt"></i> Nainital, Uttarakhand</p>
        <div class="social-icons">
          <a href="https://www.linkedin.com/in/nischay-pandey-126670368"><i class="fab fa-linkedin"></i></a>
          <a href="https://github.com/nischay1100"><i class="fab fa-github"></i></a>
          <a href="https://www.instagram.com/nischay1113"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-facebook"></i></a>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <p>Made with ❤️ by Nischay Pandey</p>
    </div>
  </footer>

<script>
// Contact Form Submission 
const form = document.getElementById("contactForm");
const message = document.getElementById("formMessage");

form.addEventListener("submit", function (e) {
  e.preventDefault();
  const formData = new FormData(form);

  fetch(form.action, {
    method: "POST",
    body: formData,
    headers: {
      Accept: "application/json"
    }
  })
  .then(response => {
    if (response.ok) {
      message.style.display = "block";
      form.reset();
    } else {
      alert("Oops! Something went wrong.");
    }
  })
  .catch(() => {
    alert("There was a problem submitting your form.");
  });
});

// Reveal Animation on Load 
document.addEventListener("DOMContentLoaded", () => {
  const reveals = document.querySelectorAll(".reveal");
  reveals.forEach((el, i) => {
    el.style.opacity = 0;
    el.style.transform = "translateY(30px)";
    setTimeout(() => {
      el.style.transition = "0.7s ease";
      el.style.opacity = 1;
      el.style.transform = "translateY(0)";
    }, i * 200);
  });

 
  document.body.style.opacity = 1;
});


document.querySelectorAll("a[href]").forEach(link => {
  const href = link.getAttribute("href");
  if (href.startsWith("#") || link.target === "_blank") return;

  link.addEventListener("click", function (e) {
    e.preventDefault();
    document.body.style.opacity = 0;

    setTimeout(() => {
      window.location.href = href;
    }, 300);
  });
});

//Mobile Menu Toggle 
const menuToggle = document.getElementById("menu-toggle");
const navLinks = document.getElementById("nav-links");

menuToggle.addEventListener("click", () => {
  navLinks.classList.toggle("active");
  document.body.classList.toggle("no-scroll");
});


const toggleBtn = document.getElementById("themeToggle");

// Load saved theme
window.addEventListener("load", () => {
  const savedTheme = localStorage.getItem("theme");
  if (savedTheme === "light") {
    document.body.classList.add("light-theme");
    toggleBtn.textContent = "☀️"; 
  } else {
    toggleBtn.textContent = "🌙"; 
  }
});

// Toggle theme
toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("light-theme");

  if (document.body.classList.contains("light-theme")) {
    localStorage.setItem("theme", "light");
    toggleBtn.textContent = "☀️"; 
  } else {
    localStorage.setItem("theme", "dark");
    toggleBtn.textContent = "🌙";  
  }
});
</script>


</body>
</html>
